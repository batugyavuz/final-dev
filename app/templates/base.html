<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RotaKaravan - Kamp ve Karavan Takip{% endblock %}</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Modern Typography: Google Fonts (Outfit) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f1612;
            color: #e4ebe5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .navbar-custom {
            background-color: #17251d;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .nav-logo-icon {
            color: #ffb703;
            margin-right: 8px;
        }
        
        .footer-custom {
            background-color: #17251d;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: auto;
            padding: 20px 0;
            text-align: center;
            font-size: 14px;
            color: #a0b2a5;
        }
        
        .text-accent {
            color: #38b000;
        }
        
        /* Modernized form elements & cards for dark theme */
        .card-custom {
            background-color: rgba(23, 37, 29, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
        }
        
        .form-control, .form-select {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e4ebe5 !important;
        }
        
        .form-control:focus, .form-select:focus {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: #38b000;
            box-shadow: 0 0 0 0.25rem rgba(56, 176, 0, 0.25);
        }
        
        .btn-success-custom {
            background-color: #38b000;
            border-color: #38b000;
            color: #fff;
        }
        
        .btn-success-custom:hover {
            background-color: #70e000;
            border-color: #70e000;
            color: #fff;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="{{ url_for('main.index') }}">
                <i class="fa-solid fa-caravan nav-logo-icon"></i>Rota<span class="text-accent">Karavan</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}" href="{{ url_for('main.index') }}">
                            <i class="fa-solid fa-chart-line"></i> Panel
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'items.list_items' %}active{% endif %}" href="{{ url_for('items.list_items') }}">
                            <i class="fa-solid fa-list-check"></i> İhtiyaç Listesi
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer-custom">
        <div class="container">
            <p class="mb-0">&copy; 2026 RotaKaravan - Doğada Düzenli Kalın. <i class="fa-solid fa-tree text-accent"></i></p>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle with Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
